name: philemon

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-philemon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-philemon}
      POSTGRES_DB: ${POSTGRES_DB:-philemon}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-philemon}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-philemon}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-philemon123}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # one-shot: create the bucket on startup
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-philemon} ${MINIO_ROOT_PASSWORD:-philemon123};
      mc mb --ignore-existing local/${MINIO_BUCKET:-furnishing};
      mc anonymous set download local/${MINIO_BUCKET:-furnishing};
      echo 'bucket ready';
      exit 0;
      "

volumes:
  pgdata:
  miniodata:
